<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — CARE TAR</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="auth-page">
  <div class="auth-card">
    <div class="auth-card__brand">
      <span class="auth-card__logo">CARE</span>
      <span class="auth-card__title">Kenya Travel Authority Request</span>
    </div>

    <h1>Sign In</h1>
    <p class="text-muted">Enter your work email and password to access the travel request system.</p>

    <div id="backend-status" class="alert alert--error" hidden role="alert"></div>

    <div id="login-error" class="alert alert--error" hidden role="alert"></div>
    <div id="activation-notice" class="alert alert--info" hidden role="status">
      Your account has not been activated. Please check your email for the activation link, or
      <a href="activate.html">activate your account</a>.
    </div>

    <form id="login-form" novalidate>
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required autocomplete="current-password" />
      </div>
      <button type="submit" class="btn btn--primary btn--block" id="login-btn">Sign In</button>
    </form>

    <p class="form-hint" style="margin-top: 1.5rem; text-align: center;">
      Need to set your password?
      <a href="activate.html">Activate your account</a>
    </p>
  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script>
    redirectIfAuthenticated();
    showBackendConnectionStatus('backend-status');

    const form = document.getElementById('login-form');
    const errorEl = document.getElementById('login-error');
    const activationNotice = document.getElementById('activation-notice');
    const loginBtn = document.getElementById('login-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.hidden = true;
      activationNotice.hidden = true;

      const email = form.email.value.trim();
      const password = form.password.value;

      if (!email || !password) {
        renderApiErrors(errorEl, { message: 'Please enter your email and password.' });
        return;
      }

      setLoading(loginBtn, true, 'Signing in…');

      try {
        await login(email, password);
        window.location.href = 'dashboard.html';
      } catch (err) {
        if (err instanceof ApiError && err.status === 403 && err.body?.details?.code === 'ACCOUNT_NOT_ACTIVATED') {
          activationNotice.hidden = false;
        } else {
          renderApiErrors(errorEl, err);
        }
      } finally {
        setLoading(loginBtn, false);
      }
    });
  </script>
</body>
</html>
