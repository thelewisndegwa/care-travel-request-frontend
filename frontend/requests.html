<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Travel Requests — CARE TAR</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="app-shell"></div>

  <div id="page-content" class="page-content" hidden>
    <div class="page-header">
      <h1 id="page-title">My Requests</h1>
      <a href="request-new.html" class="btn btn--primary" id="new-request-btn" hidden>New Request</a>
    </div>

    <div id="filters-bar" class="filters-bar" hidden>
      <div class="form-group">
        <label for="filter-status">Status</label>
        <select id="filter-status">
          <option value="">All statuses</option>
          <option value="pending">Pending</option>
          <option value="approved">Approved</option>
          <option value="rejected">Rejected</option>
        </select>
      </div>
      <div class="form-group">
        <label for="filter-search">Search</label>
        <input type="text" id="filter-search" placeholder="Purpose, destination…" />
      </div>
      <div class="form-group">
        <label for="filter-destination">Destination</label>
        <input type="text" id="filter-destination" placeholder="e.g. Nairobi" />
      </div>
      <div class="form-group" id="filter-email-group" hidden>
        <label for="filter-email">Requested by (email)</label>
        <input type="email" id="filter-email" placeholder="colleague@care.org" />
      </div>
      <button type="button" class="btn btn--secondary" id="apply-filters">Apply</button>
      <button type="button" class="btn btn--ghost" id="clear-filters">Clear</button>
    </div>

    <div id="requests-loading"></div>
    <div id="requests-list" class="request-list"></div>
    <div id="pagination" hidden></div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/requests.js"></script>
  <script src="js/notifications.js"></script>
  <script>
    if (!requireAuth()) throw new Error('auth');

    const params = new URLSearchParams(window.location.search);
    const scope = params.get('scope') || 'mine';
    const user = getUser();

    let activeNav = 'my-requests';
    let pageTitle = 'My Requests';
    let showFilters = false;
    let showNewBtn = canCreateRequests();
    let currentPage = 1;

    if (user.role === 'superadmin' || scope === 'all') {
      activeNav = 'all-requests';
      pageTitle = 'All Requests';
      showFilters = true;
      showNewBtn = false;
    } else if (scope === 'team' && isAdmin()) {
      activeNav = 'team-requests';
      pageTitle = 'Team Requests';
      showFilters = true;
    }

    renderAppShell(activeNav);
    mountPageContent('#page-content');

    document.getElementById('page-title').textContent = pageTitle;
    const newBtn = document.getElementById('new-request-btn');
    if (showNewBtn) newBtn.hidden = false;

    const filtersBar = document.getElementById('filters-bar');
    if (showFilters) {
      filtersBar.hidden = false;
      if (scope === 'team' || user.role === 'superadmin') {
        document.getElementById('filter-email-group').hidden = false;
      }
    }

    const listEl = document.getElementById('requests-list');
    const loadingEl = document.getElementById('requests-loading');
    const paginationEl = document.getElementById('pagination');

    function getFilterParams() {
      const filters = { page: currentPage, limit: 20 };
      if (!showFilters) return filters;

      const status = document.getElementById('filter-status').value;
      const search = document.getElementById('filter-search').value.trim();
      const destination = document.getElementById('filter-destination').value.trim();
      const email = document.getElementById('filter-email').value.trim();

      if (status) filters.status = status;
      if (search) filters.search = search;
      if (destination) filters.destination = destination;
      if (email) filters.requestedByEmail = email;

      return filters;
    }

    async function loadRequests() {
      showPageLoading(loadingEl);
      listEl.innerHTML = '';

      try {
        const result = await fetchMyRequests(getFilterParams());
        const requests = result.data || result.requests || result || [];
        const pagination = result.pagination;

        loadingEl.innerHTML = '';

        if (!requests.length) {
          const emptyMsg =
            scope === 'team' ? 'No team requests match your filters.'
            : user.role === 'superadmin' ? 'No requests found.'
            : 'No requests yet.';
          const action =
            showNewBtn ? '<a href="request-new.html" class="btn btn--primary">Create your first request</a>' : '';
          showEmptyState(listEl, emptyMsg, action);
        } else {
          listEl.innerHTML = requests.map(renderRequestRow).join('');
        }

        renderPagination(paginationEl, pagination, (page) => {
          currentPage = page;
          loadRequests();
        });
      } catch (err) {
        loadingEl.innerHTML = '';
        showToast(err.message || 'Failed to load requests.', 'error');
      }
    }

    document.getElementById('apply-filters')?.addEventListener('click', () => {
      currentPage = 1;
      loadRequests();
    });

    document.getElementById('clear-filters')?.addEventListener('click', () => {
      document.getElementById('filter-status').value = '';
      document.getElementById('filter-search').value = '';
      document.getElementById('filter-destination').value = '';
      document.getElementById('filter-email').value = '';
      currentPage = 1;
      loadRequests();
    });

    loadRequests();
  </script>
</body>
</html>
